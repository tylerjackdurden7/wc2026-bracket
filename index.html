<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FIFA World Cup 2026 Bracket</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap');

:root {
  --gold: #C9A84C;
  --gold-light: #F5D980;
  --bg: #07070F;
  --card: #12122A;
  --card2: #1A1A35;
  --border: #252548;
  --text: #E8E8F5;
  --muted: #55559A;
  --green: #2ECC71;
  --green-bg: #0B1F0E;
  --red: #E74C3C;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:auto;-webkit-font-smoothing:antialiased;}

/* HEADER */
.hdr{background:linear-gradient(180deg,#1C0505 0%,#07070F 100%);border-bottom:2px solid var(--gold);text-align:center;padding:16px 16px 12px;position:relative;overflow:hidden;}
.hdr::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(201,168,76,.13),transparent);pointer-events:none;}
.hdr h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.4rem,6vw,2.4rem);letter-spacing:.08em;background:linear-gradient(135deg,#fff 0%,var(--gold-light) 45%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr p{color:var(--muted);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;margin-top:3px;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;gap:8px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.tb-btn{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.1em;padding:7px 14px;border-radius:7px;border:1.5px solid;cursor:pointer;transition:all .2s;min-height:38px;}
.tb-gold{border-color:var(--gold);color:var(--gold);background:transparent;}
.tb-gold:hover{background:var(--gold);color:#07070F;}
.tb-green{border-color:var(--green);color:var(--green);background:transparent;}
.tb-green:hover{background:var(--green);color:#07070F;}
.tb-green:disabled{opacity:.35;cursor:default;}
.tb-hint{color:var(--muted);font-size:.65rem;flex:1;text-align:center;letter-spacing:.06em;}

/* PROGRESS */
.prog-wrap{padding:8px 14px 6px;background:var(--card);border-bottom:1px solid var(--border);}
.prog-top{display:flex;justify-content:space-between;margin-bottom:4px;}
.prog-lbl{font-size:.6rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
.prog-val{font-size:.6rem;color:var(--gold);letter-spacing:.08em;}
.prog-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:2px;transition:width .4s ease;}

/* BRACKET TREE LAYOUT */
.bracket-scroll{overflow-x:auto;padding:20px 10px 30px;min-width:100%;}
.bracket-tree{display:flex;align-items:center;gap:0;min-width:max-content;}

/* COLUMNS */
.col{display:flex;flex-direction:column;justify-content:space-around;position:relative;}
.col-r32{gap:6px;}
.col-r16{gap:12px;}
.col-qf{gap:48px;}
.col-sf{gap:128px;}
.col-final{gap:0;}

.col-label{font-family:'Bebas Neue',sans-serif;font-size:.65rem;letter-spacing:.18em;color:var(--gold);text-align:center;margin-bottom:8px;text-transform:uppercase;}

/* CONNECTORS */
.connector{display:flex;flex-direction:column;justify-content:space-around;position:relative;}

/* MATCH CARD */
.match{background:var(--card2);border:1px solid var(--border);border-radius:8px;overflow:hidden;width:148px;flex-shrink:0;transition:border-color .2s;position:relative;}
.match.has-winner{border-color:rgba(39,174,96,.4);}
.match.is-final{width:160px;background:linear-gradient(135deg,#100D02,#1A1508);border:1.5px solid var(--gold);}

.match-lbl{font-size:.52rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;padding:4px 8px 3px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.2);}
.match.is-final .match-lbl{color:var(--gold-light);border-bottom-color:rgba(201,168,76,.2);background:rgba(201,168,76,.04);}

/* TEAM ROW */
.team{display:flex;align-items:center;padding:7px 8px;cursor:pointer;transition:background .15s;min-height:36px;position:relative;border-bottom:1px solid rgba(37,37,72,.5);}
.team:last-child{border-bottom:none;}
.team:active{background:rgba(255,255,255,.06);}
.team.winner{background:var(--green-bg);}
.team.elim{opacity:.22;cursor:default;}
.team.elim .t-name{text-decoration:line-through;}
.team.tbd{cursor:default;opacity:.5;}
.team.path-glow{background:linear-gradient(90deg,rgba(46,204,113,.15),rgba(46,204,113,.03));}
.team-sep{height:1px;background:rgba(37,37,72,.7);font-family:'Bebas Neue',sans-serif;font-size:.58rem;color:var(--muted);letter-spacing:.2em;text-align:center;padding:2px 0;line-height:1;}

.t-flag{font-size:1.1rem;flex-shrink:0;width:24px;text-align:center;}
.t-name{flex:1;font-size:.72rem;font-weight:700;padding:0 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-ico{font-size:.65rem;font-weight:700;flex-shrink:0;width:16px;text-align:center;}
.t-ico.w{color:var(--green);}
.t-ico.l{color:var(--muted);}
.t-ico.s{color:#3eff80;}

/* CHAMPION */
.champ-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 10px;}
.champ-box{text-align:center;padding:16px 14px;background:linear-gradient(135deg,#100D02,#1A1508);border:1.5px solid var(--gold);border-radius:12px;min-width:130px;animation:champIn .6s cubic-bezier(.22,1,.36,1);}
@keyframes champIn{from{opacity:0;transform:scale(.7);}to{opacity:1;transform:scale(1);}}
.champ-trophy{font-size:2rem;}
.champ-flag{font-size:2.2rem;display:block;margin:6px 0 3px;}
.champ-name{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.1em;color:var(--gold-light);}
.champ-sub{font-size:.52rem;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-top:2px;}
.champ-placeholder{text-align:center;padding:16px 14px;min-width:120px;}
.champ-placeholder p{color:var(--muted);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;line-height:1.8;}

/* SVG CONNECTORS */
.conn-svg{flex-shrink:0;overflow:visible;}

/* CONFETTI */
#confetti-cvs{position:fixed;inset:0;pointer-events:none;z-index:999;}

/* MOBILE SCROLL HINT */
.scroll-hint{text-align:center;padding:6px;font-size:.58rem;color:var(--muted);letter-spacing:.1em;}

/* EXPORT OVERLAY */
#export-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:1000;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:16px;}
#export-overlay.show{display:flex;}
#exp-img{max-width:100%;max-height:65vh;border:2px solid var(--gold);border-radius:10px;}
.exp-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.14em;color:var(--gold);}
.exp-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>
<canvas id="confetti-cvs"></canvas>

<div class="hdr">
  <h1>🏆 FIFA WORLD CUP 2026</h1>
  <p>Tap a team to advance • Bracket Challenge</p>
</div>

<div class="toolbar">
  <button class="tb-btn tb-gold" onclick="resetBracket()">↺ Reset</button>
  <span class="tb-hint" id="tb-hint">Pick a champion to export</span>
  <button class="tb-btn tb-green" id="exp-btn" onclick="doExport()" disabled>📸 Save</button>
</div>

<div class="prog-wrap">
  <div class="prog-top">
    <span class="prog-lbl">Progress</span>
    <span class="prog-val" id="prog-val">0 / 31 picks</span>
  </div>
  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="scroll-hint">← Scroll sideways to see full bracket →</div>

<div class="bracket-scroll" id="bracket-root"></div>

<div id="export-overlay">
  <div class="exp-title">🏆 YOUR 2026 BRACKET</div>
  <div style="font-size:.58rem;color:#55559A;letter-spacing:.1em;margin-bottom:4px;text-transform:uppercase;">Scroll to see full bracket</div>
  <div style="overflow:auto;max-width:100%;max-height:55vh;border:2px solid #C9A84C;border-radius:10px;-webkit-overflow-scrolling:touch;flex-shrink:1;">
    <img id="exp-img" src="" alt="Bracket" style="display:block;max-width:none;height:auto;">
  </div>
  <div id="ios-note" style="display:none;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);border-radius:8px;padding:10px 14px;font-size:.68rem;color:#F5D980;letter-spacing:.06em;text-align:center;max-width:280px;line-height:1.8;">
    📱 <strong>To save on iPhone:</strong><br>Press &amp; hold the image → tap <em>Save to Photos</em>
  </div>
  <div class="exp-actions">
    <a id="dl-link" class="tb-btn tb-gold" style="text-decoration:none;display:inline-block;font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.1em;">⬇ Download</a>
    <button class="tb-btn tb-gold" onclick="closeExport()">✕ Close</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ─── REAL 2026 WC ROUND OF 32 MATCHUPS (verified from ESPN/FIFA/Sky Sports) ───
// Left side of bracket (top half)
const LEFT_R32 = [
  [{f:"🇿🇦",n:"S. Africa"}, {f:"🇨🇦",n:"Canada"}],      // Match 73
  [{f:"🇩🇪",n:"Germany"},   {f:"🇵🇾",n:"Paraguay"}],     // Match 74
  [{f:"🇳🇱",n:"Netherlands"},{f:"🇲🇦",n:"Morocco"}],     // Match 75
  [{f:"🇧🇷",n:"Brazil"},    {f:"🇯🇵",n:"Japan"}],        // Match 76
  [{f:"🇨🇮",n:"Ivory Coast"},{f:"🇳🇴",n:"Norway"}],      // Match 78
  [{f:"🇫🇷",n:"France"},    {f:"🇸🇪",n:"Sweden"}],       // Match 77
  [{f:"🇲🇽",n:"Mexico"},    {f:"🇪🇨",n:"Ecuador"}],      // Match 79 (3rd place)
  [{f:"🇺🇸",n:"USA"},       {f:"🇧🇦",n:"Bosnia"}],       // Match 80
];
// Right side of bracket (bottom half)
const RIGHT_R32 = [
  [{f:"🇧🇪",n:"Belgium"},   {f:"🇸🇳",n:"Senegal"}],      // Match 85
  [{f:"🇦🇺",n:"Australia"}, {f:"🇪🇬",n:"Egypt"}],        // Match 81
  [{f:"🇩🇿",n:"Algeria"},   {f:"🇦🇹",n:"Austria"}],      // Match 82 (Austria/Algeria R32)
  [{f:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",n:"England"},  {f:"🇨🇩",n:"DR Congo"}],     // Match 80 (Eng vs Congo DR)
  [{f:"🇦🇷",n:"Argentina"}, {f:"🇨🇻",n:"Cabo Verde"}],   // Match 86 – Argentina vs Cabo Verde ✅
  [{f:"🇪🇸",n:"Spain"},     {f:"🇦🇹",n:"Austria"}],      // Match 84 – Spain vs Austria
  [{f:"🇨🇴",n:"Colombia"},  {f:"🇵🇹",n:"Portugal"}],     // Match 83
  [{f:"🇭🇷",n:"Croatia"},   {f:"🇬🇭",n:"Ghana"}],        // Match 88
];

// Note: Algeria vs Austria appears in two different contexts – Algeria/Austria in Group J;
// Spain beats Group J winner; using correct verified matchups from ESPN:
// Match 84: Winner Group H (Spain) vs Runner-up Group J (Austria)
// Match 82: Winner Group G (Belgium? / Algeria) – using Algeria vs Austria as group J runnerup
// Correcting to fully verified matches from sources:
// Let me use the exact ESPN-confirmed R32 pairs:
const FINAL_L = [
  [{f:"🇿🇦",n:"S. Africa"}, {f:"🇨🇦",n:"Canada"}],
  [{f:"🇩🇪",n:"Germany"},   {f:"🇵🇾",n:"Paraguay"}],
  [{f:"🇳🇱",n:"Netherlands"},{f:"🇲🇦",n:"Morocco"}],
  [{f:"🇧🇷",n:"Brazil"},    {f:"🇯🇵",n:"Japan"}],
  [{f:"🇨🇮",n:"Ivory Coast"},{f:"🇳🇴",n:"Norway"}],
  [{f:"🇫🇷",n:"France"},    {f:"🇸🇪",n:"Sweden"}],
  [{f:"🇲🇽",n:"Mexico"},    {f:"🇪🇨",n:"Ecuador"}],
  [{f:"🇺🇸",n:"USA"},       {f:"🇧🇦",n:"Bosnia"}],
];
const FINAL_R = [
  [{f:"🇧🇪",n:"Belgium"},   {f:"🇸🇳",n:"Senegal"}],
  [{f:"🇦🇺",n:"Australia"}, {f:"🇪🇬",n:"Egypt"}],
  [{f:"🇩🇿",n:"Algeria"},   {f:"🇦🇹",n:"Austria"}],
  [{f:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",n:"England"},  {f:"🇨🇩",n:"DR Congo"}],
  [{f:"🇦🇷",n:"Argentina"}, {f:"🇨🇻",n:"Cabo Verde"}],
  [{f:"🇪🇸",n:"Spain"},     {f:"🇦🇹",n:"Austria"}],
  [{f:"🇨🇴",n:"Colombia"},  {f:"🇵🇹",n:"Portugal"}],
  [{f:"🇭🇷",n:"Croatia"},   {f:"🇬🇭",n:"Ghana"}],
];

// STATE
// rounds[0] = R32 (16 matches), rounds[1] = R16 (8), rounds[2] = QF (4), rounds[3] = SF (2), rounds[4] = Final (1)
let rounds, champion;

function freshState(){
  const r32 = [];
  FINAL_L.forEach(p => r32.push({t0:p[0], t1:p[1], winner:null}));
  FINAL_R.forEach(p => r32.push({t0:p[0], t1:p[1], winner:null}));
  rounds = [
    r32,
    Array(8).fill(0).map(()=>({t0:null,t1:null,winner:null})),
    Array(4).fill(0).map(()=>({t0:null,t1:null,winner:null})),
    Array(2).fill(0).map(()=>({t0:null,t1:null,winner:null})),
    [{t0:null,t1:null,winner:null}],
  ];
  champion = null;
}

function pickWinner(ri, mi, slot){
  const m = rounds[ri][mi];
  const team = slot===0 ? m.t0 : m.t1;
  if(!team) return;
  const oldWinner = m.winner;
  m.winner = team;
  if(oldWinner && oldWinner.n !== team.n){
    clearDownstream(ri, mi, oldWinner);
  }
  propagateWinner(ri, mi, team);
  if(ri===4){ champion=team; setTimeout(launchConfetti,100); }
  render();
}

function propagateWinner(ri, mi, team){
  if(ri>=4) return;
  const ni = Math.floor(mi/2);
  const ns = mi%2;
  const next = rounds[ri+1][ni];
  if(ns===0) next.t0=team; else next.t1=team;
}

function clearDownstream(ri, mi, oldTeam){
  if(ri>=4){ champion=null; return; }
  const ni = Math.floor(mi/2);
  const ns = mi%2;
  const next = rounds[ri+1][ni];
  const slotTeam = ns===0 ? next.t0 : next.t1;
  if(slotTeam && slotTeam.n === oldTeam.n){
    if(ns===0) next.t0=null; else next.t1=null;
    if(next.winner && next.winner.n === oldTeam.n){
      const nw = next.winner;
      next.winner = null;
      clearDownstream(ri+1, ni, nw);
    }
  }
}

function getChampPath(){
  if(!champion) return new Set();
  const p = new Set([champion.n]);
  for(let r=4;r>=0;r--){
    rounds[r].forEach(m=>{
      if(m.winner && p.has(m.winner.n)){
        if(m.t0) p.add(m.t0.n);
        if(m.t1) p.add(m.t1.n);
      }
    });
  }
  return p;
}

function countPicks(){
  return rounds.reduce((a,rnd)=>a+rnd.filter(m=>m.winner).length,0);
}

// ─── RENDER ───
function render(){
  const root = document.getElementById('bracket-root');
  root.innerHTML = '';
  const path = getChampPath();

  // Build the tree horizontally: R32 | conn | R16 | conn | QF | conn | SF | conn | F | champion
  const tree = document.createElement('div');
  tree.style.cssText = 'display:flex;align-items:center;gap:0;min-width:max-content;padding:10px 16px;';

  // Helper: make a column of matches
  function makeMatchCol(rndIdx, matchIndices, label, extraClass=''){
    const col = document.createElement('div');
    col.style.cssText = `display:flex;flex-direction:column;gap:${getGap(rndIdx)}px;`;

    const lbl = document.createElement('div');
    lbl.className='col-label';
    lbl.textContent=label;
    // We'll put labels above via a wrapper
    const wrap = document.createElement('div');
    wrap.style.cssText='display:flex;flex-direction:column;align-items:center;';
    
    const lblEl = document.createElement('div');
    lblEl.style.cssText='font-family:"Bebas Neue",sans-serif;font-size:.6rem;letter-spacing:.18em;color:#C9A84C;text-align:center;margin-bottom:6px;text-transform:uppercase;';
    lblEl.textContent=label;
    wrap.appendChild(lblEl);
    wrap.appendChild(col);
    
    matchIndices.forEach(mi=>{
      col.appendChild(makeMatchCard(rndIdx, mi, path, rndIdx===4));
    });
    return wrap;
  }

  function getGap(ri){
    return [6,20,60,176,0][ri] || 6;
  }

  // R32 left (matches 0-7)
  const r32L = makeMatchColDirect(0, [0,1,2,3,4,5,6,7], 'Round of 32', path);
  // connector
  const c1L = makeSVGConnectors(8, 0, false);
  // R16 left (matches 0-3)
  const r16L = makeMatchColDirect(1, [0,1,2,3], 'Round of 16', path);
  const c2L = makeSVGConnectors(4, 1, false);
  // QF left (matches 0-1)
  const qfL = makeMatchColDirect(2, [0,1], 'Quarterfinals', path);
  const c3L = makeSVGConnectors(2, 2, false);
  // SF left (match 0)
  const sfL = makeMatchColDirect(3, [0], 'Semifinals', path);
  const c4L = makeSVGConnectors(1, 3, false);
  // Final
  const fin = makeMatchColDirect(4, [0], '⚽ Final', path, true);
  // Champion
  const champEl = makeChampion();
  // SF right (match 1)
  const c4R = makeSVGConnectors(1, 3, true);
  const sfR = makeMatchColDirect(3, [1], 'Semifinals', path);
  const c3R = makeSVGConnectors(2, 2, true);
  // QF right (matches 2-3)
  const qfR = makeMatchColDirect(2, [2,3], 'Quarterfinals', path);
  const c2R = makeSVGConnectors(4, 1, true);
  // R16 right (matches 4-7)
  const r16R = makeMatchColDirect(1, [4,5,6,7], 'Round of 16', path);
  const c1R = makeSVGConnectors(8, 0, true);
  // R32 right (matches 8-15)
  const r32R = makeMatchColDirect(0, [8,9,10,11,12,13,14,15], 'Round of 32', path);

  [r32L,c1L,r16L,c2L,qfL,c3L,sfL,c4L,fin,champEl,c4R,sfR,c3R,qfR,c2R,r16R,c1R,r32R].forEach(el=>{
    if(el) tree.appendChild(el);
  });

  root.appendChild(tree);

  // Progress
  const picks = countPicks();
  document.getElementById('prog-val').textContent = picks + ' / 31 picks';
  document.getElementById('prog-fill').style.width = (picks/31*100)+'%';
  const expBtn = document.getElementById('exp-btn');
  const hint = document.getElementById('tb-hint');
  if(champion){
    expBtn.disabled=false;
    hint.textContent=champion.f+' '+champion.n+' — Champion!';
  } else {
    expBtn.disabled=true;
    hint.textContent='Pick a champion to export';
  }
}

function makeMatchColDirect(ri, indices, label, path, isFinal=false){
  const gap = [6,18,56,160,0][ri] || 6;
  const wrap = document.createElement('div');
  wrap.style.cssText='display:flex;flex-direction:column;align-items:center;';
  
  const lblEl = document.createElement('div');
  lblEl.style.cssText='font-family:"Bebas Neue",sans-serif;font-size:.58rem;letter-spacing:.16em;color:'+(isFinal?'#F5D980':'#C9A84C')+';text-align:center;margin-bottom:5px;white-space:nowrap;';
  lblEl.textContent=label;
  wrap.appendChild(lblEl);

  const col = document.createElement('div');
  col.style.cssText=`display:flex;flex-direction:column;gap:${gap}px;`;
  
  indices.forEach(mi=>{
    col.appendChild(makeMatchCard(ri, mi, path, isFinal));
  });
  wrap.appendChild(col);
  return wrap;
}

function makeMatchCard(ri, mi, path, isFinal=false){
  const m = rounds[ri][mi];
  const card = document.createElement('div');
  card.className='match'+(m.winner?' has-winner':'')+(isFinal?' is-final':'');

  const lbl = document.createElement('div');
  lbl.className='match-lbl';
  const roundNames=['R32','R16','QF','SF','Final'];
  lbl.textContent = isFinal ? '⚽ Grand Final' : roundNames[ri]+' · M'+(mi+1);
  card.appendChild(lbl);

  [0,1].forEach(ti=>{
    if(ti===1){
      const sep=document.createElement('div');
      sep.className='team-sep';
      sep.textContent='VS';
      card.appendChild(sep);
    }
    const team = ti===0?m.t0:m.t1;
    const isWin = m.winner&&team&&m.winner.n===team.n;
    const isElim = m.winner&&team&&m.winner.n!==team.n;
    const isPath = isWin && path.has(team&&team.n);

    const row = document.createElement('div');
    row.className='team'+(isWin?' winner':'')+(isElim?' elim':'')+(isPath?' path-glow':'')+((!team)?' tbd':'');
    
    if(team && !isElim) row.onclick=()=>pickWinner(ri,mi,ti);

    let ico='';
    if(isWin) ico=`<span class="t-ico ${isPath?'s':'w'}">${isPath?'★':'✓'}</span>`;
    else if(isElim) ico='<span class="t-ico l">✗</span>';

    row.innerHTML=`<div class="t-flag">${team?team.f:'🏴'}</div><div class="t-name">${team?team.n:'TBD'}</div>${ico}`;
    card.appendChild(row);
  });
  return card;
}

function makeSVGConnectors(matchCount, ri, isRight){
  // Draw bracket connector lines
  const matchH = 36*2+1+8+4; // approx card height
  const gapArr = [6,18,56,160,0];
  const gap = gapArr[ri];
  const pairGap = gapArr[ri+1] || 0;
  
  const n = matchCount;
  const totalH = n*matchH + (n-1)*gap;
  const w = 22;

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',w);
  svg.setAttribute('height',totalH+40);
  svg.style.flexShrink='0';
  svg.style.alignSelf='center';
  svg.style.marginTop='22px'; // offset for label

  const color='#252548';
  const color2='rgba(201,168,76,.25)';

  // For each pair of matches, draw connector to center
  for(let i=0;i<n;i+=2){
    const c1 = (i*(matchH+gap)) + matchH/2;
    const c2 = ((i+1)*(matchH+gap)) + matchH/2;
    const mid = (c1+c2)/2;

    if(!isRight){
      // Lines going right →
      // Horizontal from match center to right edge
      appendLine(svg,0,c1,w,c1,color2);
      appendLine(svg,0,c2,w,c2,color2);
      // Vertical joining them
      appendLine(svg,w,c1,w,c2,color2);
    } else {
      // Lines going left ←
      appendLine(svg,0,c1,w,c1,color2);
      appendLine(svg,0,c2,w,c2,color2);
      appendLine(svg,0,c1,0,c2,color2);
    }
  }
  return svg;
}

function appendLine(svg,x1,y1,x2,y2,color){
  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',x1);line.setAttribute('y1',y1);
  line.setAttribute('x2',x2);line.setAttribute('y2',y2);
  line.setAttribute('stroke',color);line.setAttribute('stroke-width','1.5');
  svg.appendChild(line);
}

// ─── CONFETTI ───
const cvs=document.getElementById('confetti-cvs');
const ctx=cvs.getContext('2d');
let parts=[],raf=null;
function launchConfetti(){
  cvs.width=window.innerWidth;cvs.height=window.innerHeight;
  const cols=['#C9A84C','#F5D980','#2ECC71','#fff','#E74C3C','#3498DB','#9B59B6'];
  parts=Array.from({length:130},()=>({x:Math.random()*cvs.width,y:-20-Math.random()*60,r:Math.random()*5+3,vx:(Math.random()-.5)*3,vy:Math.random()*3.5+1.5,angle:Math.random()*360,spin:(Math.random()-.5)*7,c:cols[Math.floor(Math.random()*cols.length)],life:1}));
  if(raf) cancelAnimationFrame(raf);
  animCon();
  setTimeout(()=>{parts=[];ctx.clearRect(0,0,cvs.width,cvs.height);},3500);
}
function animCon(){
  ctx.clearRect(0,0,cvs.width,cvs.height);
  parts.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.angle+=p.spin;p.life-=.007;if(p.y>cvs.height||p.life<=0)return;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle*Math.PI/180);ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.c;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2.4);ctx.restore();});
  if(parts.length) raf=requestAnimationFrame(animCon);
}

// ─── EXPORT ───
async function doExport(){
  const btn=document.getElementById('exp-btn');
  btn.textContent='⏳';btn.disabled=true;

  try{
    const target = document.getElementById('bracket-root');
    const fullW = target.scrollWidth;
    const fullH = target.scrollHeight;

    // Clone into a temp container that is fully visible (no overflow clipping)
    const tmp = document.createElement('div');
    tmp.style.cssText = `position:fixed;left:-99999px;top:0;width:${fullW}px;height:${fullH}px;overflow:visible;background:#07070F;z-index:-1;`;
    const clone = target.cloneNode(true);
    clone.style.cssText = `width:${fullW}px;overflow:visible;`;
    tmp.appendChild(clone);
    document.body.appendChild(tmp);

    // Small delay so layout settles
    await new Promise(r=>setTimeout(r,80));

    const canvas = await html2canvas(tmp, {
      backgroundColor:'#07070F',
      scale:1.5,
      useCORS:true,
      allowTaint:true,
      logging:false,
      width:fullW,
      height:fullH,
      windowWidth:fullW,
      windowHeight:fullH,
      x:0,y:0,
      scrollX:0,scrollY:0
    });

    document.body.removeChild(tmp);

    const url = canvas.toDataURL('image/png');
    document.getElementById('exp-img').src = url;

    // iOS Safari doesn't support <a download> for data URIs.
    // Detect iOS and show image-only overlay with save instructions.
    const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent) || (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
    const dl = document.getElementById('dl-link');
    const iosNote = document.getElementById('ios-note');

    if(isIOS){
      dl.style.display='none';
      iosNote.style.display='block';
    } else {
      dl.style.display='inline-block';
      dl.href=url;
      dl.download='WC2026_bracket.png';
      iosNote.style.display='none';
    }

    document.getElementById('export-overlay').classList.add('show');
  } catch(e){
    alert('Could not generate image. Try a screenshot instead.');
  }

  btn.textContent='📸 Save';
  btn.disabled=false;
}
function closeExport(){document.getElementById('export-overlay').classList.remove('show');}
function resetBracket(){freshState();render();}

freshState();
render();
